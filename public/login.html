<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Corsica Poker – Accès</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(27,94,32,.45), transparent 40%),
        linear-gradient(180deg, #07110d 0%, #091813 100%);
      color: #f7fff9;
    }
    .box {
      width: min(92vw, 380px);
      padding: 28px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(8,16,13,.82);
      box-shadow: 0 18px 44px rgba(0,0,0,.38);
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .logo { font-size: 42px; margin-bottom: 8px; }
    h1 { margin: 0 0 6px; font-size: 28px; }
    p { margin: 0 0 18px; color: #d4e6da; }
    input, button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 15px;
      font-size: 16px;
    }
    input { margin-bottom: 12px; background: #f7fff9; color: #122019; }
    button {
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(180deg, #3bb25e, #20763b);
      color: white;
    }
    #error { min-height: 20px; margin-top: 12px; color: #ff9a9a; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">♠</div>
    <h1>Corsica Poker</h1>
    <p>Entrez le code d’accès</p>
    <input id="code" type="password" inputmode="numeric" placeholder="Code" maxlength="12" />
    <button id="enterBtn" type="button">Entrer</button>
    <div id="error"></div>
  </div>
  <script>
    async function login() {
      const code = document.getElementById('code').value;
      const error = document.getElementById('error');
      error.textContent = '';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ code })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          error.textContent = data.error || 'Code incorrect';
          return;
        }
        window.location.href = '/';
      } catch (err) {
        error.textContent = 'Connexion impossible';
      }
    }
    document.getElementById('enterBtn').addEventListener('click', login);
    document.getElementById('code').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
