<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corsica Poker - Accès</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #17324d, #07111c 60%); font-family: Arial, sans-serif; color: #fff; }
    .box { width: min(92vw, 360px); padding: 28px; border-radius: 18px; background: rgba(255,255,255,0.08); box-shadow: 0 18px 45px rgba(0,0,0,0.35); text-align: center; }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 18px; opacity: 0.88; }
    input, button { width: 100%; padding: 13px 14px; border: 0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
    input { margin-bottom: 12px; }
    button { font-weight: 700; cursor: pointer; }
    #error { min-height: 24px; margin-top: 12px; color: #ff9b9b; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Corsica Poker</h1>
    <p>Entrez le code d'accès</p>
    <input id="code" type="password" placeholder="Code" autofocus />
    <button id="btn">Entrer</button>
    <div id="error"></div>
  </div>
  <script>
    const input = document.getElementById('code');
    const error = document.getElementById('error');
    const button = document.getElementById('btn');

    async function login() {
      error.textContent = '';
      button.disabled = true;
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ code: input.value })
        });
        if (!res.ok) {
          error.textContent = 'Code incorrect';
          button.disabled = false;
          input.focus();
          input.select();
          return;
        }
        window.location.href = '/';
      } catch (e) {
        error.textContent = 'Connexion impossible';
        button.disabled = false;
      }
    }

    button.addEventListener('click', login);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
